name: Docker Publish

on:
  push:
    tags: ["v*"]

env:
  REGISTRY: docker.io
  IMAGE_NAME: monadcrypto/monad-solonet

jobs:
  docker-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=sha,format=long

      - name: Build and Push
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: monad-solonet
          file: monad-solonet/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            SOLONET_VERSION=${{ github.ref_name }}
          sbom: true
          provenance: mode=max

      - name: Sign image (keyless)
        env:
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: cosign sign --yes "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${DIGEST}"

      - name: Inspect provenance
        env:
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: |
          docker buildx imagetools inspect "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${DIGEST}" --format "{{ json .Provenance }}" | jq .

      - name: Update release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: |
          if gh release view "$TAG" &>/dev/null; then
            EXISTING=$(gh release view "$TAG" --json body -q .body)
            NEW_NOTES="${EXISTING}
          ## Docker Image

          \`\`\`
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG#v}
          \`\`\`

          **Digest:** \`${DIGEST}\`
          **Docker Hub:** https://hub.docker.com/r/${{ env.IMAGE_NAME }}/tags
          "
            gh release edit "$TAG" --notes "$NEW_NOTES"
          fi

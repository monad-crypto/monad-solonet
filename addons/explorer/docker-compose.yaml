volumes:
  db-data:

services:
  db:
    image: postgres:17
    shm_size: 256m
    container_name: 'db'
    command: postgres -c 'max_connections=200' -c 'client_connection_check_interval=60000'
    environment:
        POSTGRES_DB: 'blockscout'
        POSTGRES_USER: 'blockscout'
        POSTGRES_PASSWORD: 'ceWb1MeLBEeOIfk65gU8EjF8'
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blockscout -d blockscout"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  blockscout:
    image: ghcr.io/blockscout/blockscout
    container_name: "backend"
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "bin/blockscout eval \"Elixir.Explorer.ReleaseTasks.create_and_migrate()\" && bin/blockscout start"
    ports:
      - "4000:4000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql://blockscout:ceWb1MeLBEeOIfk65gU8EjF8@db:5432/blockscout
      SECRET_KEY_BASE: "aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
      ETHEREUM_JSONRPC_HTTP_URL: http://host.docker.internal:8080
      ETHEREUM_JSONRPC_TRACE_URL: http://host.docker.internal:8080
      ETHEREUM_JSONRPC_WS_URL: ws://host.docker.internal:8081
      CHAIN_ID: "20143"
      COIN: MON
      COIN_NAME: Monad
      NETWORK: Monad
      SUBNETWORK: Solonet
      ECTO_USE_SSL: "false"
      PORT: "4000"
      DISABLE_EXCHANGE_RATES: "true"
      DISABLE_KNOWN_TOKENS: "true"
      CACHE_BLOCK_COUNT_PERIOD: 2s
      INDEXER_CATCHUP_BLOCKS_BATCH_SIZE: 20
      INDEXER_CATCHUP_BLOCKS_CONCURRENCY: 20
      INDEXER_DISABLE_PENDING_TRANSACTIONS_FETCHER: "true"
      API_V2_ENABLED: "true"

  frontend:
    image: ghcr.io/blockscout/frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_HOST: localhost
      NEXT_PUBLIC_API_WEBSOCKET_PROTOCOL: ws
      NEXT_PUBLIC_API_PORT: "4000"
      NEXT_PUBLIC_API_PROTOCOL: http
      NEXT_PUBLIC_APP_HOST: localhost
      NEXT_PUBLIC_APP_PORT: "3000"
      NEXT_PUBLIC_APP_PROTOCOL: http
      NEXT_PUBLIC_NETWORK_NAME: Monad Solonet
      NEXT_PUBLIC_NETWORK_SHORT_NAME: Solonet
      NEXT_PUBLIC_NETWORK_ID: "20143"
      NEXT_PUBLIC_NETWORK_CURRENCY_NAME: Monad
      NEXT_PUBLIC_NETWORK_CURRENCY_SYMBOL: MON
      NEXT_PUBLIC_NETWORK_CURRENCY_DECIMALS: "18"
      NEXT_PUBLIC_IS_TESTNET: "false"

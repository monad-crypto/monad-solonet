global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "otel-collector"
    static_configs:
      - targets:
          - "host.docker.internal:48089"
        labels:
          node: "node-1"

      - targets:
          - "host.docker.internal:48189"
        labels:
          node: "node-2"

      - targets:
          - "host.docker.internal:48289"
        labels:
          node: "node-3"

      - targets:
          - "host.docker.internal:8889"
        labels:
          node: "host-mode"

    relabel_configs:
      - source_labels: [node]
        target_label: instance

  - job_name: "node-exporter"
    static_configs:
      - targets:
          - "node-exporter:9100"

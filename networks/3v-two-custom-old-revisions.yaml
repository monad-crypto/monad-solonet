# Example compose file for a three-validator network with two custom profiles.
# Canonical source: scenarios/examples/3v-two-custom-old-revisions.toml
# Reviewers can read this file directly; operators should prefer
# `./scripts/scenario up scenarios/examples/3v-two-custom-old-revisions.toml`
# so the compose stays in sync with the scenario definition.
#
# This example expects these local worktree binaries to exist on the host:
# - /home/ubuntu/monad-bft/.worktrees/custom_old_bft/target/release/monad-node
# - /home/ubuntu/monad/.worktrees/custom_old_exec/build/cmd/monad

volumes:
  shared-data:

networks:
  solonet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.60.0/24

services:
  init:
    container_name: 3v-two-custom-old-revisions-init
    build: ../monad-solonet
    command: ["setup-monad-sysctl.sh"]
    privileged: true
    network_mode: host
    volumes:
      - /:/host

  solonet-node-1:
    container_name: 3v-two-custom-old-revisions-solonet-node-1
    build: ../monad-solonet
    depends_on:
      init:
        condition: service_completed_successfully
    networks:
      solonet:
        ipv4_address: 172.21.60.11
    privileged: true
    ports:
      - 50080:8080
      - 50081:8081
      - 50082:8082
    ulimits:
      nofile:
        soft: 16384
        hard: 16384
    volumes:
      - shared-data:/shared
      - /home/ubuntu/monad-bft/.worktrees/custom_old_bft/target/release/monad-node:/opt/solonet/custom/custom_old_bft/monad-node:ro
    environment:
      KEYSTORE_PASSWORD: password
      NODE_ID: 1
      NODE_TYPE: validator
      TOTAL_NODE_NUMBER: 3
      DEVICE_ID_START: 30
      PROFILE_NAME: custom_old_bft
      PROFILE_KIND: custom
      STAKE_WEIGHT: 1
      STAKING_REGISTER_AMOUNT: 100000
      STAKING_DELEGATE_AMOUNT: 100000
      MONAD_NODE_BIN: /opt/solonet/custom/custom_old_bft/monad-node

  solonet-node-2:
    container_name: 3v-two-custom-old-revisions-solonet-node-2
    build: ../monad-solonet
    depends_on:
      init:
        condition: service_completed_successfully
    networks:
      solonet:
        ipv4_address: 172.21.60.12
    privileged: true
    ports:
      - 50180:8080
      - 50181:8081
      - 50182:8082
    ulimits:
      nofile:
        soft: 16384
        hard: 16384
    volumes:
      - shared-data:/shared
      - /home/ubuntu/monad/.worktrees/custom_old_exec/build/cmd/monad:/opt/solonet/custom/custom_old_exec/monad:ro
    environment:
      KEYSTORE_PASSWORD: password
      NODE_ID: 2
      NODE_TYPE: validator
      TOTAL_NODE_NUMBER: 3
      DEVICE_ID_START: 30
      PROFILE_NAME: custom_old_exec
      PROFILE_KIND: custom
      STAKE_WEIGHT: 1
      STAKING_REGISTER_AMOUNT: 100000
      STAKING_DELEGATE_AMOUNT: 100000
      MONAD_EXEC_BIN: /opt/solonet/custom/custom_old_exec/monad

  solonet-node-3:
    container_name: 3v-two-custom-old-revisions-solonet-node-3
    build: ../monad-solonet
    depends_on:
      init:
        condition: service_completed_successfully
    networks:
      solonet:
        ipv4_address: 172.21.60.13
    privileged: true
    ports:
      - 50280:8080
      - 50281:8081
      - 50282:8082
    ulimits:
      nofile:
        soft: 16384
        hard: 16384
    volumes:
      - shared-data:/shared
    environment:
      KEYSTORE_PASSWORD: password
      NODE_ID: 3
      NODE_TYPE: validator
      TOTAL_NODE_NUMBER: 3
      DEVICE_ID_START: 30
      PROFILE_NAME: default
      PROFILE_KIND: default
      STAKE_WEIGHT: 1
      STAKING_REGISTER_AMOUNT: 100000
      STAKING_DELEGATE_AMOUNT: 100000

[program:monad-rpc]
autostart=false
autorestart=true
stopasgroup=true
killasgroup=true
stdout_logfile_maxbytes = 10MB
stderr_logfile_maxbytes = 10MB
stdout_logfile=/var/log/monad-rpc.log
stderr_logfile=/var/log/monad-rpc.log
environment=
  RUST_LOG="debug,h2=warn,tower=warn,opentelemetry_sdk=warn,opentelemetry-otlp=warn"
command=cpulimit --foreground -l 50 -- monad-rpc --allow-unprotected-txs
  --rpc-port=8080
  --ipc-path=/home/monad/monad-bft/mempool.sock
  --triedb-path=/dev/triedb
  --otel-endpoint="http://0.0.0.0:4317"
  --node-config=/home/monad/monad-bft/config/node.toml
  --exec-event-path=/var/lib/hugetlbfs/user/monad/pagesize-2MB/event-rings/monad-exec-events
  --ws-enabled
